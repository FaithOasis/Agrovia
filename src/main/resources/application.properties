spring.application.name=AgroVia

# Active Profile - use 'local' for development
spring.profiles.active=local

# Default Database Configuration (fallback)
spring.datasource.url=jdbc:mysql://localhost:3306/agrovia?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=default_user
spring.datasource.password=default_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration for MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=yourSuperSecretKeyThatIsAtLeast32CharactersLong1234567890
jwt.expiration=86400000

# Server Port (if 8080 is busy)
server.port=8080